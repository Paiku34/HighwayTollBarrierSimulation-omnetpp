[General]
network = HighwayBarrier
num-rngs = 3
**.highway.rng-0 = 0
**.highway.rng-1 = 1
**.barrier.etcLane[*].rng-0 = 2
**.barrier.stdLane[*].rng-0 = 2
sim-time-limit = 1000000s
seed-set = ${repetition}
**.barrier.N = 8
**.highway.Tc = 9s
**.highway.Tt = 90s
**.barrier.stdLane[*].mean = 62s
**.barrier.etcLane[*].serviceTime = 5s
**.barrier.K = 2
**.highway.p = 0.3
repeat = 5



#####################################################################
### Degeneracy tests

[DegeneracyTest_K0]
**.barrier.K = 0

# same test as K=0, because before the ETC equpped cars went to the standard lanes
[DegeneracyTest_p0_K0]
**.barrier.K = 0
**.highway.p = 0

[DegeneracyTest_p0_K2]
**.highway.Tc = 14s # with 9 seconds it queues up
**.barrier.K = 2
**.highway.p = 0

#####################################################################
### Consistency tests

# N = 20 to don't have queue
[Consistency_onlyCars]
**.highway.Tc = 15s
**.highway.Tt = 10000s
**.highway.p = 0
**.barrier.K = 0
**.barrier.N = 20

[Consistency_onlyTruck]
**.highway.Tc = 10000s
**.highway.Tt = 15s
**.highway.p = 0
**.barrier.K = 0
**.barrier.N = 20

# To confront with General: 
#	number of cars stays equal
#	waiting and service times doubles
[Consistency_doubleArrivalAndServiceRates]
**.highway.Tc = 18s
**.highway.Tt = 180s
**.barrier.stdLane[*].mean = 124s
**.barrier.etcLane[*].serviceTime = 10s

# TODO: double arrival rate, double N and K

# TODO double N, K, double service rates


########################################################################
### Continuity  tests

[Continuity_Tc]
**.barrier.stdLane[*].mean = ${15s, 16s} # no queue, response time should be equal to service time 15s and 16s


########################################################################
[_2k_r]
**.barrier.K = ${1, 6}
**.barrier.etcLane[*].serviceTime = ${1s, 5s}
**.barrier.stdLane[*].mean = 3s
**.highway.Tc = 1s
**.highway.Tt = 1s
**.highway.p = 0.3

[BaseConfig]
**.barrier.K = 3
**.barrier.etcLane[*].serviceTime = 1s
**.barrier.stdLane[*].mean = 3s
**.highway.Tc = 1s
**.highway.Tt = 1s
**.highway.p = 0.3

[Varing_K]
extends = BaseConfig
**.barrier.K = ${1, 2, 3, 5}

[Varing_p]
extends = BaseConfig
**.highway.p = ${0.1, 0.2, 0.4, 0.6, 0.95}





[N6_K2]
**.barrier.N = 6
**.barrier.K = 2

[N2_K1]
**.barrier.N = 2
**.barrier.K = 1

[N5_K0]
**.barrier.N = 5
**.barrier.K = 0

[etc1s_std2s]
**.barrier.etcLane[*].serviceTime = 1s
**.barrier.stdLane[*].mean = 2s

[VaryingTcTt]
extends = N6_K2
**.barrier.etcLane[*].serviceTime = 1s
**.barrier.stdLane[*].mean = 2s
**.highway.Tc = 1s
**.highway.Tt = 1s
**.highway.p = ${0.1, 0.2, 0.4, 0.6, 0.8}
